<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cyberpunk Ops Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/menu.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <script>
      // Apply theme from localStorage immediately to prevent flash
      (function(){
        try{
          const theme = localStorage.getItem('theme') || 'Light';
          if(theme === 'Dark') document.documentElement.classList.add('dark-theme');
          else document.documentElement.classList.remove('dark-theme');
        }catch(e){}
      })();
    </script>
    <script defer src="https://unpkg.com/animejs@3.2.1/lib/anime.min.js"></script>
    <script defer src="/socket.io/socket.io.js"></script>
    <script defer src="./js/menu.js"></script>
  </head>
  <body class="bg-grid bg-black text-cyan-100 font-inter">
    <div id="particles" class="fixed inset-0 z-0"></div>
    <div class="relative z-10 min-h-screen p-6 dashboard">
      <aside class="sidebar">
        <div class="side-brand">
          <svg viewBox="0 0 24 24" class="logo" aria-hidden><circle cx="12" cy="12" r="10"/></svg>
          <div>
            <div class="app">LiveSupport</div>
            <div class="sub">Support Console</div>
          </div>
        </div>
        <nav class="menu">
          <a href="./dashboard.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14l4-4h12c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg><span class="nav-label">Dashboard</span></a>
          <a href="./tickets.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 7V4H4v3H2v10h18V7h-0zM6 6h12v2H6V6zm12 10H6v-6h12v6z"/></svg><span class="nav-label">Tickets</span></a>
          <a href="./staff-performance.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M5 9h3v11H5zM10 4h3v16h-3zM15 13h3v7h-3z"/></svg><span class="nav-label">Staff Performance</span></a>
          <a href="./analytics.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 17h2V9H3v8zm4 0h2V3H7v14zm4 0h2v-6h-2v6zm4 0h2v-9h-2v9z"/></svg><span class="nav-label">Analytics</span></a>
          <a href="./knowledge.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2L2 7v6c0 5 4 9 10 9s10-4 10-9V7l-10-5zM12 4.4L18.6 8 12 11.6 5.4 8 12 4.4z"/></svg><span class="nav-label">Knowledge Base</span></a>
          <a href="./orders.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zM7.16 14l.84-2h7.45l1.24 3H7.16zM7.6 6h10.8l-1.2 3H8.8L7.6 6z"/></svg><span class="nav-label">Orders</span></a>
          <a href="./tracking.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 8a4 4 0 100 8 4 4 0 000-8zm0-6c-6.6 0-12 5.4-12 12 0 3.6 1.6 6.8 4.2 9l.8-2.6C4.1 19.1 3 16.6 3 14 3 8.5 7.6 4 13 4s10 4.5 10 10c0 2.6-1.1 5.1-2.9 6.4L21 23c2.6-2.2 4-5.4 4-9 0-6.6-5.4-12-12-12z"/></svg><span class="nav-label">Tracking</span></a>
          <a href="./instagram.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M7 2h10a5 5 0 015 5v10a5 5 0 01-5 5H7a5 5 0 01-5-5V7a5 5 0 015-5zm5 6a5 5 0 100 10 5 5 0 000-10zm4-3a1 1 0 110 2 1 1 0 010-2z"/></svg><span class="nav-label">Instagram</span></a>
          <a href="./menu.html" class="active"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 3h18v4H3zM3 9h18v12H3z"/></svg><span class="nav-label">Cyber Ops</span></a>
          <a href="./settings.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M19.14 12.94a7.89 7.89 0 000-1.88l2.03-1.58-2-3.46-2.39.96a8.1 8.1 0 00-1.6-.93l-.36-2.5h-4l-.36 2.5c-.57.24-1.1.55-1.6.93L6.8 6.02l-2 3.46L6.83 11a7.89 7.89 0 000 1.88l-2.03 1.58 2 3.46 2.39-.96c.5.38 1.03.69 1.6.93l.36 2.5h4l.36-2.5c.57-.24 1.1-.55 1.6-.93l2.39.96 2-3.46-2.03-1.58zM12 15.5A3.5 3.5 0 1112 8.5a3.5 3.5 0 010 7z"/></svg><span class="nav-label">Settings</span></a>
        </nav>
        <div class="side-footer">v1.0 • Live</div>
      </aside>

      <div class="main">
      <header class="topbar">
        <div class="flex items-center gap-4">
          <div class="logo-glow px-4 py-2 rounded-lg text-xl font-bold">CYBERKITCHEN</div>
          <nav class="space-x-4 hidden md:block">
            <button class="menu-tab active">Menu Management</button>
            <button class="menu-tab">Live Orders</button>
            <button class="menu-tab">Floor Tables</button>
            <button class="menu-tab">Inventory</button>
            <button class="menu-tab">AI Insights</button>
          </nav>
        </div>
        <div class="top-right">
          <div class="profile">
            <button id="profileBtn" class="btn profile-btn" aria-haspopup="true" aria-expanded="false">
              <img class="avatar-sm-img" src="" alt="avatar" style="display:none" />
              <span class="avatar-sm">O</span>
            </button>
            <div id="profileDropdown" class="profile-dropdown" aria-hidden="true">
              <div class="profile-info"><strong id="profileName">Ops</strong></div>
              <div class="profile-actions" style="margin-top:8px">
                <a id="profileSettings" class="profile-action" href="/settings.html">Settings</a>
                <a id="privacyPolicy" class="profile-action" href="/privacy.html">Privacy Policy</a>
                <button id="logoutBtn" class="profile-action">Logout</button>
              </div>
            </div>
          </div>
        </div>
      </header>

      <main class="grid grid-cols-12 gap-6">
        <!-- Left: Menu Management -->
        <section class="col-span-12 lg:col-span-7">
          <div class="panel glass-card">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-2xl font-bold neon">Menu Management</h2>
              <div class="flex items-center gap-3">
                <button id="addItemBtn" class="magnetic-btn">+ Add Item</button>
                <select id="categoryFilter" class="glass-pill">
                  <option value="all">All Categories</option>
                </select>
              </div>
            </div>

            <div id="menuGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
          </div>
        </section>

        <!-- Right: Tables and Analytics -->
        <section class="col-span-12 lg:col-span-5 space-y-6">
          <div class="panel glass-card">
            <h3 class="text-xl font-semibold neon">Restaurant Floor</h3>
            <div id="floorMap" class="mt-4 floor-map"></div>
          </div>

          <div class="panel glass-card">
            <h3 class="text-xl font-semibold neon">Sales & Insights</h3>
            <div class="mt-3 grid grid-cols-2 gap-3">
              <div class="insight-card glass-pill">Sales Today<br><span id="salesToday" class="text-2xl font-bold">$0</span></div>
              <div class="insight-card glass-pill">Active Orders<br><span id="activeOrders" class="text-2xl font-bold">0</span></div>
            </div>
          </div>
        </section>
      </main>

      <!-- Edit Drawer -->
      <aside id="editDrawer" class="edit-drawer">
        <div class="drawer-content glass-card">
          <button id="closeDrawer" class="close-x">✕</button>
          <h3 id="drawerTitle" class="text-2xl font-bold neon mb-2">Edit Item</h3>
          <form id="itemForm" class="space-y-3">
            <input name="name" placeholder="Name" class="input" />
            <input name="price" placeholder="Price" class="input" />
            <input name="category" placeholder="Category" class="input" />
            <input name="stock" placeholder="Stock" class="input" />
            <input name="prepTime" placeholder="Prep time (min)" class="input" />
            <div class="flex gap-2">
              <button type="submit" class="magnetic-btn">Save</button>
              <button type="button" id="deleteItem" class="danger-btn">Delete</button>
            </div>
          </form>
        </div>
      </aside>
    </div>
    </div>
  </body>
</html>
