    <!-- headband arc -->
    <path d="M88 78 A40 40 0 0 1 168 78" fill="none" stroke="#ffffff" stroke-width="12" />
    <!-- left earcup -->
    <rect x="64" y="96" width="26" height="34" rx="6" fill="#ffffff" stroke="none" />
    <!-- right earcup -->
    <rect x="166" y="96" width="26" height="34" rx="6" fill="#ffffff" stroke="none" />
